<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Sustentável - Concurso Agrinho</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Projeto: Fazenda do Futuro</h1>
        <p>Equilíbrio entre Produção e Meio Ambiente</p>
    </header>

    <section id="character-panel">
        <h2>Escolha seu personagem</h2>
        <div id="characters">
            <button class="character-card selected" onclick="escolherPersonagem('Maria Rita')">
                <span class="character-avatar">🌿</span>
                <strong>Maria Rita</strong>
                <small>Jovem agricultora que acredita em práticas sustentáveis.</small>
            </button>
            <button class="character-card" onclick="escolherPersonagem('Ana')">
                <span class="character-avatar">🌱</span>
                <strong>Ana</strong>
                <small>Engenheira agrícola que otimiza produção e proteção ambiental.</small>
            </button>
            <button class="character-card" onclick="escolherPersonagem('Seu João')">
                <span class="character-avatar">🚜</span>
                <strong>Seu João</strong>
                <small>Agricultor experiente que conhece bem o solo e as colheitas.</small>
            </button>
        </div>
        <p id="character-description">Personagem ativo: Maria Rita</p>
    </section>

    <div id="game-container">
        <div id="game-board">
            <p id="status-jogo">Sustentabilidade: 50 | Produção: 50</p>
            <div id="game-actions">
                <button class="btn-info" onclick="tomarDecisao('aduboOrganico')">Usar Adubo Orgânico</button>
                <button class="btn-info" onclick="tomarDecisao('agrotoxico')">Usar Agrotóxico</button>
            </div>
        </div>
    </div>

    <footer>
        <p>Desenvolvido para o Concurso Agrinho 2026</p>
        <p>Por: Maria Rita</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
